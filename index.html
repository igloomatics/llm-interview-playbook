<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM-playbook</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    
    <!-- MathJax支持 -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$']],
                displayMath: [['$$', '$$']]
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <script src="questions.js"></script>
    <style>
        :root {
            --bg: #fafafa;
            --surface: #ffffff;
            --text: #171717;
            --muted: #737373;
            --border: #e5e5e5;
            --accent: #171717;
            --radius: 2px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            --code-bg: #f4f4f5;
            --code-fg: #27272a;
            --ok: #16a34a;
            --bad: #dc2626;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px 20px 96px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 42rem;
            margin: 0 auto;
        }

        .header {
            text-align: left;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 1.375rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--text);
            margin-bottom: 6px;
        }

        .header p {
            font-size: 0.875rem;
            color: var(--muted);
            font-weight: 400;
        }

        .stats {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 16px 18px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px 24px;
        }

        .stat-item {
            text-align: left;
            min-width: 4.5rem;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        .stat-label {
            color: var(--muted);
            margin-top: 2px;
            font-size: 0.75rem;
        }

        .controls {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 18px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        .filter-group {
            margin-bottom: 14px;
        }

        .filter-group:last-child {
            margin-bottom: 0;
        }

        .filter-label {
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
        }

        .category-label {
            font-weight: 500;
            color: var(--muted);
            margin-right: 10px;
            font-size: 0.8125rem;
            display: inline-block;
            min-width: 5.5rem;
        }

        .topic-row {
            display: flex;
            align-items: flex-start;
            margin-bottom: 0;
            flex-wrap: wrap;
            gap: 8px 0;
            padding-bottom: 12px;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .topic-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .btn-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.8125rem;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
            font-weight: 450;
        }

        .btn:hover {
            background: var(--bg);
            border-color: #d4d4d4;
        }

        .btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .btn.submit {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            font-size: 0.875rem;
            padding: 8px 16px;
        }

        .btn.submit:hover {
            opacity: 0.92;
        }

        .btn.submit:disabled {
            background: #d4d4d4;
            border-color: #d4d4d4;
            color: #737373;
            cursor: not-allowed;
            opacity: 1;
        }

        .btn.next {
            background: var(--text);
            color: #fff;
            border-color: var(--text);
        }

        .btn.next:hover {
            opacity: 0.9;
        }

        .wrong-answers-btn {
            position: fixed;
            top: 16px;
            right: 16px;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 14px;
            font-size: 0.8125rem;
            font-weight: 500;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            z-index: 1000;
        }

        .wrong-answers-btn:hover {
            background: var(--bg);
            border-color: #d4d4d4;
        }

        .wrong-answers-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .wrong-answers-btn .count-badge {
            display: inline-block;
            background: var(--bg);
            padding: 1px 8px;
            border-radius: var(--radius);
            margin-left: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid var(--border);
        }

        .wrong-answers-btn.active {
            background: var(--text);
            color: #fff;
            border-color: var(--text);
        }

        .wrong-answers-btn.active .count-badge {
            background: transparent;
            border-color: rgba(255, 255, 255, 0.35);
            color: inherit;
        }

        .wrong-answers-btn.active:hover {
            opacity: 0.92;
        }

        .question-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 22px 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        .question-card.trading-card {
            box-shadow: none;
        }

        .question-card.trading-card::before {
            display: none;
        }

        .book-status {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 14px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text);
            font-size: 0.8125rem;
            gap: 10px;
            flex-wrap: wrap;
        }

        .book-status strong {
            color: var(--text);
            font-weight: 600;
        }

        .book-status-main {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .book-status-back {
            padding: 4px 10px;
            font-size: 0.75rem;
        }

        .book-opening-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            animation: fadeIn 0.15s ease-out;
        }

        .book-opening-box {
            width: min(360px, 90vw);
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            text-align: center;
            padding: 28px 20px;
        }

        .book-opening-cover {
            width: 120px;
            height: 72px;
            margin: 0 auto 16px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--muted);
        }

        .book-opening-title {
            font-size: 0.9375rem;
            color: var(--text);
            font-weight: 500;
        }

        .book-opening-subtitle {
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.8125rem;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .question-number {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--muted);
        }

        .badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 3px 8px;
            border-radius: var(--radius);
            font-size: 0.6875rem;
            font-weight: 500;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--muted);
        }

        .badge.difficulty-easy {
            border-color: #d4d4d4;
            color: var(--text);
        }

        .badge.difficulty-medium {
            border-color: #a3a3a3;
            color: var(--text);
        }

        .badge.difficulty-hard {
            border-color: var(--text);
            color: var(--text);
            background: var(--surface);
        }

        .badge.topic {
            border-color: var(--border);
            color: var(--muted);
        }

        .badge-type {
            border-color: var(--border) !important;
            background: var(--surface) !important;
            color: var(--text) !important;
        }

        .question-content {
            font-size: 0.9375rem;
            line-height: 1.65;
            margin-bottom: 18px;
            color: var(--text);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option {
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            transition: background 0.12s;
            background: var(--surface);
        }

        .option:hover {
            background: var(--bg);
        }

        .option.selected {
            background: var(--bg);
            border-color: var(--text);
        }

        .option.correct {
            background: rgba(22, 163, 74, 0.06);
            border-color: var(--ok);
            border-width: 1px;
        }

        .option.incorrect {
            background: rgba(220, 38, 38, 0.06);
            border-color: var(--bad);
            border-width: 1px;
        }

        .code-block {
            background: var(--code-bg);
            padding: 14px 16px;
            border-radius: var(--radius);
            margin: 14px 0;
            overflow-x: auto;
            position: relative;
            font-family: ui-monospace, 'Consolas', 'Monaco', 'Courier New', monospace;
            border: 1px solid var(--border);
        }

        .code-block code {
            color: var(--code-fg);
            font-size: 0.875rem;
            line-height: 1.6;
            font-family: inherit;
        }

        .code-block pre {
            margin: 0;
            white-space: pre;
            word-wrap: normal;
        }

        /* Prism token 高亮（浅色底，与整站极简一致） */
        .code-block .token.comment,
        .code-block .token.prolog,
        .code-block .token.doctype,
        .code-block .token.cdata,
        .unified-code-editor .token.comment,
        .unified-code-editor .token.prolog,
        .unified-code-editor .token.doctype,
        .unified-code-editor .token.cdata {
            color: #71717a;
            font-style: italic;
        }

        .code-block .token.punctuation,
        .unified-code-editor .token.punctuation {
            color: #52525b;
        }

        .code-block .token.property,
        .code-block .token.tag,
        .code-block .token.boolean,
        .code-block .token.number,
        .code-block .token.constant,
        .code-block .token.symbol,
        .code-block .token.deleted,
        .unified-code-editor .token.property,
        .unified-code-editor .token.tag,
        .unified-code-editor .token.boolean,
        .unified-code-editor .token.number,
        .unified-code-editor .token.constant,
        .unified-code-editor .token.symbol,
        .unified-code-editor .token.deleted {
            color: #b45309;
        }

        .code-block .token.selector,
        .code-block .token.attr-name,
        .code-block .token.string,
        .code-block .token.char,
        .code-block .token.builtin,
        .code-block .token.inserted,
        .unified-code-editor .token.selector,
        .unified-code-editor .token.attr-name,
        .unified-code-editor .token.string,
        .unified-code-editor .token.char,
        .unified-code-editor .token.builtin,
        .unified-code-editor .token.inserted {
            color: #15803d;
        }

        .code-block .token.operator,
        .code-block .token.entity,
        .code-block .token.url,
        .code-block .language-css .token.string,
        .code-block .style .token.string,
        .unified-code-editor .token.operator,
        .unified-code-editor .token.entity,
        .unified-code-editor .token.url,
        .unified-code-editor .language-css .token.string,
        .unified-code-editor .style .token.string {
            color: #0e7490;
        }

        .code-block .token.atrule,
        .code-block .token.attr-value,
        .code-block .token.keyword,
        .unified-code-editor .token.atrule,
        .unified-code-editor .token.attr-value,
        .unified-code-editor .token.keyword {
            color: #6d28d9;
            font-weight: 600;
        }

        .code-block .token.function,
        .code-block .token.class-name,
        .unified-code-editor .token.function,
        .unified-code-editor .token.class-name {
            color: #0369a1;
        }

        .code-block .token.regex,
        .code-block .token.important,
        .code-block .token.variable,
        .unified-code-editor .token.regex,
        .unified-code-editor .token.important,
        .unified-code-editor .token.variable {
            color: #be123c;
        }

        .code-block .token.important,
        .code-block .token.bold,
        .unified-code-editor .token.important,
        .unified-code-editor .token.bold {
            font-weight: 600;
        }

        .code-block .token.italic,
        .unified-code-editor .token.italic {
            font-style: italic;
        }

        .code-blank {
            display: inline-block;
            min-width: 120px;
            padding: 3px 8px;
            background: var(--surface);
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: ui-monospace, 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.15s, background 0.15s;
            vertical-align: baseline;
        }

        .code-blank:focus {
            border-style: solid;
            border-color: var(--text);
            background: var(--surface);
        }

        .code-blank.correct {
            background: rgba(22, 163, 74, 0.08);
            border: 1px solid var(--ok);
            border-style: solid;
            color: var(--text);
        }

        .code-blank.incorrect {
            background: rgba(220, 38, 38, 0.08);
            border: 1px solid var(--bad);
            border-style: solid;
            color: var(--text);
        }

        .code-blank:disabled {
            cursor: not-allowed;
            opacity: 1;
        }

        .code-blank::placeholder {
            color: var(--muted);
        }

        /* 多行代码输入框样式 */
        .code-textarea-container {
            margin: 16px 0;
        }

        .code-textarea-label {
            display: block;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 8px;
            font-size: 0.8125rem;
        }

        .code-textarea {
            width: 100%;
            min-height: 150px;
            padding: 12px 14px;
            background: var(--surface);
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: ui-monospace, 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 0.875rem;
            line-height: 1.6;
            resize: vertical;
            outline: none;
            transition: border-color 0.15s, background 0.15s;
        }

        .code-textarea:focus {
            border-style: solid;
            border-color: var(--text);
        }

        .code-textarea.correct {
            background: rgba(22, 163, 74, 0.08);
            border: 1px solid var(--ok);
            border-style: solid;
            color: var(--text);
        }

        .code-textarea.incorrect {
            background: rgba(220, 38, 38, 0.08);
            border: 1px solid var(--bad);
            border-style: solid;
            color: var(--text);
        }

        .code-textarea:disabled {
            cursor: not-allowed;
        }

        .code-textarea::placeholder {
            color: var(--muted);
        }

        /* 统一代码编辑器样式 - 用于代码默写 */
        .unified-code-editor {
            background: var(--code-bg);
            border-radius: var(--radius);
            padding: 0;
            margin: 14px 0;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .unified-code-editor pre {
            margin: 0;
            padding: 14px 16px;
            overflow-x: auto;
        }

        .unified-code-editor code {
            font-family: ui-monospace, 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 0.875rem;
            line-height: 1.6;
            color: var(--code-fg);
        }

        .inline-code-input {
            background: var(--surface);
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: ui-monospace, 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 0.875rem;
            line-height: 1.6;
            padding: 10px 12px;
            outline: none;
            resize: vertical;
            width: 100%;
            margin: 6px 0;
            min-height: 100px;
            transition: border-color 0.15s, background 0.15s;
            display: block;
        }

        .inline-code-input:focus {
            border-style: solid;
            border-color: var(--text);
            outline: none;
        }

        .inline-code-input.correct {
            background: rgba(22, 163, 74, 0.08);
            border: 1px solid var(--ok);
            border-style: solid;
            color: var(--text);
        }

        .inline-code-input.incorrect {
            background: rgba(220, 38, 38, 0.08);
            border: 1px solid var(--bad);
            border-style: solid;
            color: var(--text);
        }

        .inline-code-input:disabled {
            cursor: not-allowed;
        }

        .inline-code-input::placeholder {
            color: var(--muted);
        }

        .code-hint {
            display: inline-block;
            color: var(--muted);
            font-size: 0.8125rem;
            margin-left: 6px;
        }

        .feedback {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg);
        }

        .feedback.correct {
            border-color: var(--border);
        }

        .feedback.incorrect {
            border-color: #d4d4d4;
        }

        .feedback-title {
            font-weight: 500;
            font-size: 0.8125rem;
            margin-bottom: 8px;
            color: var(--text);
        }

        .feedback.correct .feedback-title {
            color: var(--text);
        }

        .feedback.incorrect .feedback-title {
            color: var(--muted);
        }

        .explanation {
            line-height: 1.7;
            color: var(--text);
            font-size: 0.875rem;
        }

        .explanation strong {
            font-weight: 600;
            color: var(--text);
        }

        .explanation h1,
        .explanation h2,
        .explanation h3,
        .explanation h4 {
            margin-top: 1.1em;
            margin-bottom: 0.5em;
            color: var(--text);
            font-weight: 600;
        }

        .explanation h1 {
            font-size: 1.4em;
        }

        .explanation h2 {
            font-size: 1.25em;
        }

        .explanation h3 {
            font-size: 1.1em;
        }

        .explanation p {
            margin-bottom: 0.8em;
        }

        .explanation ul,
        .explanation ol {
            margin-left: 1.5em;
            margin-bottom: 0.8em;
        }

        .explanation li {
            margin-bottom: 0.4em;
        }

        .explanation code {
            background: var(--surface);
            padding: 1px 5px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 0.85em;
            color: var(--text);
        }

        .explanation pre {
            background: var(--code-bg);
            padding: 14px 16px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow-x: auto;
            margin: 1em 0;
        }

        .explanation pre code {
            background: none;
            padding: 0;
            color: var(--code-fg);
            font-size: 0.875rem;
            border: none;
        }

        .explanation blockquote {
            border-left: 2px solid var(--border);
            padding-left: 1em;
            margin: 1em 0;
            color: var(--muted);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .no-questions {
            text-align: center;
            padding: 48px 20px;
            color: var(--muted);
            font-size: 0.9375rem;
        }

        .progress-bar {
            height: 2px;
            background: var(--border);
            border-radius: 0;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .progress-fill {
            height: 100%;
            background: var(--text);
            transition: width 0.25s ease;
        }

        .resource-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;

    **TRPO (2015) - Trust Region Policy Optimization**
    - **作者**：John Schulman等 (UC Berkeley)
    - **核心思想**：用KL散度约束限制策略更新步长
    - **数学表达**：$max E[A] s.t. KL(π_old || π_new) ≤ δ$
    - **关键特性**：
  - 理论保证单调策略改进
  - 训练过程非常稳定
  - 计算成本高（二阶优化）
  - 实现复杂度较高

    **PPO (2017) - Proximal Policy Optimization**
    - **作者**：John Schulman等 (OpenAI)
    - **核心思想**：用clipping机制替代KL约束
    - **数学表达**：$L = min(r_t·A_t, clip(r_t, 1-ε, 1+ε)·A_t)$
    - **关键特性**：
        - 简单易实现（一阶优化）
        - 效果接近TRPO
        - 超参数鲁棒（ε=0.2）
        - 当前最主流的RL算法
    - **重要应用**：ChatGPT的RLHF训练核心算法

    **GRPO (2024) - Group Relative Policy Optimization**
    - **应用场景**：DeepSeek R1等大语言模型
    - **核心思想**：无需Critic网络，使用群组相对奖励
    - **数学表达**：$$A_i = (r_i - mean(r)) / std(r)$$
    - **关键特性**：
        - 无需价值网络（省50%参数）
        - 特别适合LLM对齐
        - 训练简单高效
        - 内存友好


        
        **技术演进：**
        TRPO奠定理论基础 → PPO简化实现成为主流 → GRPO针对LLM优化

三代算法体现了强化学习从理论到实践、从通用到专用的发展历程。`,
                image: 'Transformer.png'
            }
        };

        function TransformerQuiz() {
            const [selectedDifficulty, setSelectedDifficulty] = useState('全部');
            const [selectedTopic, setSelectedTopic] = useState('全部');
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [userAnswers, setUserAnswers] = useState([]);
            const [showFeedback, setShowFeedback] = useState(false);
            const [isCorrect, setIsCorrect] = useState(false);
            const [stats, setStats] = useState({ total: 0, correct: 0, attempted: 0 });
            const [showResources, setShowResources] = useState(false);
            const [showFullCode, setShowFullCode] = useState(false);
            const [wrongAnswerIds, setWrongAnswerIds] = useState(new Set());
            const [showWrongAnswersOnly, setShowWrongAnswersOnly] = useState(false);
            const [showTopicIntro, setShowTopicIntro] = useState(false); // 新增：控制专题介绍显示
            const [shuffledOrder, setShuffledOrder] = useState(null); // 新增：保存打乱后的题目顺序
            const [isOpeningBook, setIsOpeningBook] = useState(false);
            const [openingBookTopic, setOpeningBookTopic] = useState('');

            const filteredQuestions = allQuestions.filter(q => {
                // 先处理错题筛选
                if (showWrongAnswersOnly && !wrongAnswerIds.has(q.id)) {
                    return false;
                }
                // 再处理难度和主题筛选
                const difficultyMatch = selectedDifficulty === '全部' || q.difficulty === selectedDifficulty;
                const topicMatch = selectedTopic === '全部' || q.topic === selectedTopic;
                return difficultyMatch && topicMatch;
            });
            
            // 根据专题和打乱状态显示题目
            const displayQuestions = (() => {
                // 手撕Transformer专题始终按order排序，不打乱
                if (selectedTopic === '手撕Transformer') {
                    return filteredQuestions.sort((a, b) => (a.order || 0) - (b.order || 0));
                }
                
                // 如果有打乱顺序，按打乱顺序排列
                if (shuffledOrder) {
                    const orderMap = new Map(shuffledOrder.map((id, index) => [id, index]));
                    return filteredQuestions.sort((a, b) => {
                        const orderA = orderMap.get(a.id);
                        const orderB = orderMap.get(b.id);
                        // 如果在打乱顺序中，按顺序排列；否则保持原顺序
                        if (orderA !== undefined && orderB !== undefined) {
                            return orderA - orderB;
                        }
                        return 0;
                    });
                }
                
                // 默认：手撕Transformer按order排序，其他题目保持原顺序
                return filteredQuestions.sort((a, b) => {
                    if (a.topic === '手撕Transformer' && b.topic === '手撕Transformer') {
                        return (a.order || 0) - (b.order || 0);
                    }
                    return 0;
                });
            })();

            const currentQuestion = displayQuestions[currentQuestionIndex];

            // 当筛选条件变化时重置
            useEffect(() => {
                setCurrentQuestionIndex(0);
                setShowFeedback(false);
                setShowFullCode(false);
                setShuffledOrder(null); // 清除打乱顺序
            }, [selectedDifficulty, selectedTopic, showWrongAnswersOnly]);

            // 【修复bug】确保索引不越界（特别是在错题模式下答对题目后）
            useEffect(() => {
                if (displayQuestions.length > 0 && currentQuestionIndex >= displayQuestions.length) {
                    setCurrentQuestionIndex(Math.max(0, displayQuestions.length - 1));
                }
            }, [displayQuestions.length, currentQuestionIndex]);

            // 当题目变化时初始化答案数组
            useEffect(() => {
                if (currentQuestion) {
                    if (currentQuestion.type === '选择' || currentQuestion.type === '多选') {
                        setUserAnswers(currentQuestion.type === '多选' ? [] : [null]);
                    } else if (currentQuestion.type === '提示') {
                        setUserAnswers([]);  // 提示类型不需要答案
                    } else if (currentQuestion.type === '代码' || currentQuestion.type === '代码默写') {
                        const blankCount = (currentQuestion.code?.match(/\[blank\]/g) || []).length;
                        setUserAnswers(new Array(blankCount).fill(''));
                    }
                }
                setShowFeedback(false);
                setShowFullCode(false);
            }, [currentQuestionIndex]);

            // MathJax渲染
            useEffect(() => {
                const timer = setTimeout(() => {
                    if (window.MathJax && window.MathJax.typesetPromise) {
                        window.MathJax.typesetPromise().catch((err) => {
                            console.error('MathJax渲染错误:', err);
                        });
                    }
                }, 100);
                return () => clearTimeout(timer);
            }, [showTopicIntro, showFeedback, currentQuestionIndex]);

            const handleAnswerChange = (index, value) => {
                if (currentQuestion.type === '多选') {
                    // 多选题：切换选项
                    setUserAnswers(prev => {
                        const newAnswers = [...prev];
                        const optionIndex = newAnswers.indexOf(value);
                        if (optionIndex > -1) {
                            newAnswers.splice(optionIndex, 1);
                        } else {
                            newAnswers.push(value);
                        }
                        return newAnswers.sort((a, b) => a - b);
                    });
                } else {
                    // 单选题和代码题
                    setUserAnswers(prev => {
                        const newAnswers = [...prev];
                        newAnswers[index] = value;
                        return newAnswers;
                    });
                }
            };

            const handleSubmit = () => {
                if (!currentQuestion) return;

                let correct = false;
                
                if (currentQuestion.type === '提示') {
                    // 提示类型不需要验证，直接标记为正确
                    correct = true;
                } else if (currentQuestion.type === '代码默写' || currentQuestion.type === '简答' || currentQuestion.type === '填空') {
                    // 代码默写、简答、填空题：不判断对错，直接显示答案供学习
                    correct = true;  // 标记为正确，避免进入错题本
                    setShowFeedback(true);  // 直接显示答案
                    return;  // 不更新统计数据
                } else if (currentQuestion.type === '选择') {
                    correct = parseInt(userAnswers[0]) === currentQuestion.correct;
                } else if (currentQuestion.type === '多选') {
                    // 多选题：比较两个数组是否相等
                    const userSelected = userAnswers.slice().sort((a, b) => a - b);
                    const correctAnswers = currentQuestion.correct.slice().sort((a, b) => a - b);
                    correct = userSelected.length === correctAnswers.length && 
                              userSelected.every((val, idx) => val === correctAnswers[idx]);
                } else if (currentQuestion.type === '代码') {
                    const normalized = userAnswers.map(ans => ans.trim().toLowerCase());
                    
                    if (currentQuestion.acceptedAnswers) {
                        correct = currentQuestion.acceptedAnswers.every((acceptedList, idx) => {
                            return acceptedList.some(accepted => 
                                normalized[idx] === accepted.toLowerCase()
                            );
                        });
                    } else {
                        correct = currentQuestion.answers.every((ans, idx) => 
                            normalized[idx] === ans.toLowerCase()
                        );
                    }
                }

                setIsCorrect(correct);
                setShowFeedback(true);
                setStats(prev => ({
                    total: prev.total,
                    correct: prev.correct + (correct ? 1 : 0),
                    attempted: prev.attempted + 1
                }));

                // 记录错题
                if (!correct) {
                    setWrongAnswerIds(prev => new Set([...prev, currentQuestion.id]));
                } else {
                    // 答对了就从错题集中移除
                    setWrongAnswerIds(prev => {
                        const newSet = new Set(prev);
                        newSet.delete(currentQuestion.id);
                        return newSet;
                    });
                }
            };

            const handleNext = () => {
                if (currentQuestionIndex < displayQuestions.length - 1) {
                    // 【修复bug】在错题复习模式下，如果刚答对了题，索引不需要+1
                    // 因为filteredQuestions已经变短，当前索引自然指向下一题
                    if (showWrongAnswersOnly && isCorrect && showFeedback) {
                        // 答对错题后，不增加索引（数组已变短，当前位置就是下一题）
                        // 但需要重置状态
                        setShowFeedback(false);
                        setIsCorrect(false);
                        setUserAnswers([]);
                        setShowFullCode(false);
                    } else {
                        // 正常情况：索引+1，并重置所有状态
                        setCurrentQuestionIndex(prev => prev + 1);
                        setShowFeedback(false);
                        setIsCorrect(false);
                        setUserAnswers([]);
                        setShowFullCode(false);
                    }
                } else if (showWrongAnswersOnly && isCorrect && showFeedback) {
                    // 边界情况：答对了最后一道错题，只重置状态，保持在当前位置
                    // 这样可以让用户看到"已完成所有错题"的提示
                    setShowFeedback(false);
                    setIsCorrect(false);
                    setUserAnswers([]);
                    setShowFullCode(false);
                }
            };

            const handlePrevious = () => {
                if (currentQuestionIndex > 0) {
                    setCurrentQuestionIndex(prev => prev - 1);
                    setShowFeedback(false);
                    setIsCorrect(false);
                    setUserAnswers([]);
                    setShowFullCode(false);
                }
            };

            // 打乱题目顺序
            const handleShuffle = () => {
                // 手撕Transformer专题不打乱
                if (selectedTopic === '手撕Transformer') {
                    return;
                }
                
                // Fisher-Yates洗牌算法
                const ids = filteredQuestions.map(q => q.id);
                const shuffled = [...ids];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                
                setShuffledOrder(shuffled);
                setCurrentQuestionIndex(0); // 重置到第一题
                setShowFeedback(false);
                setIsCorrect(false);
                setUserAnswers([]);
                setShowFullCode(false);
            };

            // 恢复顺序
            const handleResetOrder = () => {
                setShuffledOrder(null);
                setCurrentQuestionIndex(0);
                setShowFeedback(false);
                setIsCorrect(false);
                setUserAnswers([]);
                setShowFullCode(false);
            };

            const checkBlankCorrect = (index) => {
                if (!currentQuestion.acceptedAnswers) {
                    return userAnswers[index]?.trim().toLowerCase() === 
                           currentQuestion.answers[index]?.toLowerCase();
                }
                const normalized = userAnswers[index]?.trim().toLowerCase();
                return currentQuestion.acceptedAnswers[index]?.some(ans => 
                    normalized === ans.toLowerCase()
                );
            };

            const toggleWrongAnswers = () => {
                setShowWrongAnswersOnly(!showWrongAnswersOnly);
                setShowTopicIntro(false); // 切换错题模式时隐藏介绍页
                setIsOpeningBook(false);
            };

            const handleTopicChange = (topic) => {
                setSelectedTopic(topic);
                if (topic !== '全部') {
                    setOpeningBookTopic(topic);
                    setIsOpeningBook(true);
                    setTimeout(() => setIsOpeningBook(false), 900);
                } else {
                    setIsOpeningBook(false);
                    setOpeningBookTopic('');
                }
                // 如果选择的不是"全部"，且该专题有介绍，则显示介绍页
                if (topic !== '全部' && topicIntros[topic]) {
                    setShowTopicIntro(true);
                } else {
                    setShowTopicIntro(false);
                }
            };

            const startQuiz = () => {
                setShowTopicIntro(false);
            };

            const renderCodeBlock = () => {
                // 代码默写类型:可以切换查看完整代码
                if (currentQuestion.type === '代码默写' && currentQuestion.fullCode) {
                    if (showFullCode) {
                        // 显示完整代码
                        const highlightedCode = typeof Prism !== 'undefined' && Prism.languages.python
                            ? Prism.highlight(currentQuestion.fullCode, Prism.languages.python, 'python')
                            : currentQuestion.fullCode;
                        
                        return (
                            <div className="code-block">
                                <pre><code dangerouslySetInnerHTML={{ __html: highlightedCode }} /></pre>
                            </div>
                        );
                    } else {
                        // 默写模式：统一的代码编辑器样式
                        const parts = currentQuestion.code.split('[blank]');
                        
                        return (
                            <div className="unified-code-editor">
                                <pre><code>
                                    {parts.map((part, i) => (
                                        <React.Fragment key={i}>
                                            {/* 提示代码部分 - 使用语法高亮 */}
                                            {part && (
                                                <span dangerouslySetInnerHTML={{ 
                                                    __html: typeof Prism !== 'undefined' && Prism.languages.python
                                                        ? Prism.highlight(part, Prism.languages.python, 'python')
                                                        : part 
                                                }} />
                                            )}
                                            {/* 代码输入框 - 内联在代码中 */}
                                            {i < parts.length - 1 && (
                                                <>
                                                    <span className="code-hint"># 空白 {i + 1}</span>
                                                    {'\n'}
                                                    <textarea
                                                        className={`inline-code-input ${showFeedback ? (
                                                            checkBlankCorrect(i) ? 'correct' : 'incorrect'
                                                        ) : ''}`}
                                                        value={userAnswers[i] ?? ''}
                                                        onChange={(e) => handleAnswerChange(i, e.target.value)}
                                                        disabled={showFeedback}
                                                        placeholder="# 在这里输入你的代码..."
                                                        spellCheck="false"
                                                    />
                                                    {'\n'}
                                                </>
                                            )}
                                        </React.Fragment>
                                    ))}
                                </code></pre>
                            </div>
                        );
                    }
                }
                
                // 普通代码填空
                const parts = currentQuestion.code.split('[blank]');
                
                return (
                    <div className="code-block">
                        <pre><code>
                            {parts.map((part, i) => {
                                // 手动应用Prism高亮
                                const highlightedCode = typeof Prism !== 'undefined' && Prism.languages.python
                                    ? Prism.highlight(part, Prism.languages.python, 'python')
                                    : part;
                                
                                return (
                                    <React.Fragment key={i}>
                                        <span dangerouslySetInnerHTML={{ __html: highlightedCode }} />
                                        {i < parts.length - 1 && (
                                            <input
                                                type="text"
                                                className={`code-blank ${showFeedback ? (
                                                    checkBlankCorrect(i) ? 'correct' : 'incorrect'
                                                ) : ''}`}
                                                value={userAnswers[i] ?? ''}
                                                onChange={(e) => handleAnswerChange(i, e.target.value)}
                                                disabled={showFeedback}
                                                placeholder="..."
                                                style={{ width: `${Math.max(120, ((userAnswers[i] ?? '').length || 1) * 10)}px` }}
                                            />
                                        )}
                                    </React.Fragment>
                                );
                            })}
                        </code></pre>
                    </div>
                );
            };

            // 不需要全局的Prism.highlightAll()，因为我们手动高亮了

            if (!currentQuestion) {
                return (
                    <div className="container">
                        <div className="header">
                            <h1>LLM-playbook</h1>
                            <p>书架上的薄册 · 取下即练</p>
                        </div>
                        
                        {/* 错题复习按钮 - 右上角固定位置 */}
                        <button
                            className={`wrong-answers-btn ${showWrongAnswersOnly ? 'active' : ''}`}
                            onClick={toggleWrongAnswers}
                            disabled={wrongAnswerIds.size === 0}
                            title={wrongAnswerIds.size === 0 ? '暂无错题' : '点击查看错题'}
                        >
                            {showWrongAnswersOnly ? '回书架' : '错题复习'}
                            {wrongAnswerIds.size > 0 && (
                                <span className="count-badge">{wrongAnswerIds.size}</span>
                            )}
                        </button>
                        
                        <div className="question-card">
                            <div className="no-questions">
                                {showWrongAnswersOnly ? (
                                    <>
                                        <div style={{ fontSize: '0.9375rem', marginBottom: '10px', fontWeight: '600', color: 'var(--text)' }}>
                                            错题已清空
                                        </div>
                                        <div style={{ color: 'var(--muted)', marginBottom: '20px', fontSize: '0.875rem' }}>
                                            你已经把所有错题都答对了，继续保持！
                                        </div>
                                        <button 
                                            className="btn submit" 
                                            onClick={() => setShowWrongAnswersOnly(false)}
                                            style={{ marginTop: '10px' }}
                                        >
                                            返回题库继续练习
                                        </button>
                                    </>
                                ) : (
                                    '暂无符合筛选条件的题目，请调整筛选条件'
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            const progress = ((currentQuestionIndex + 1) / displayQuestions.length) * 100;
            const canSubmit = currentQuestion.type === '提示' ? 
                true :  // 提示类型总是可以继续
                currentQuestion.type === '代码默写' || currentQuestion.type === '简答' || currentQuestion.type === '填空' ?
                true :  // 代码默写、问答题随时可以查看答案
                currentQuestion.type === '选择' ? 
                userAnswers[0] !== null && userAnswers[0] !== undefined : 
                currentQuestion.type === '多选' ?
                userAnswers.length > 0 :
                userAnswers.every(ans => ans !== '');

            return (
                <div className="container">
                    {isOpeningBook && (
                        <div className="book-opening-overlay">
                            <div className="book-opening-box">
                                <div className="book-opening-cover">薄册</div>
                                <div className="book-opening-title">从书架取下《{openingBookTopic}》…</div>
                                <div className="book-opening-subtitle">小小一册，专治一个小专题</div>
                            </div>
                        </div>
                    )}
                    <div className="header">
                        <h1>LLM-playbook</h1>
                        <p>书架上的薄册 · 每册一个小专题 · 取下再练 · 错题可收复</p>
                    </div>

                    <div className="stats">
                        <div className="stat-item">
                            <div className="stat-value">{stats.attempted}</div>
                            <div className="stat-label">已答题数</div>
                        </div>
                        <div className="stat-item">
                            <div className="stat-value">{stats.correct}</div>
                            <div className="stat-label">正确数</div>
                        </div>
                        <div className="stat-item">
                            <div className="stat-value">
                                {stats.attempted > 0 ? Math.round((stats.correct / stats.attempted) * 100) : 0}%
                            </div>
                            <div className="stat-label">正确率</div>
                        </div>
                        <div className="stat-item">
                            <div className="stat-value">{displayQuestions.length}</div>
                            <div className="stat-label">可见题数</div>
                        </div>
                    </div>

                    <div className="controls">
                        <div className="filter-group">
                            {/* NLP系列 */}
                            <div className="topic-row">
                                <span className="category-label">NLP</span>
                                <div className="btn-group">
                                    {['Transformer入门', 'Transformer进阶', '手撕Transformer', 'BERT', 'LLaMA', 'GPT','DeepSeek'].map(topic => (
                                        <button
                                            key={topic}
                                            className={`btn ${selectedTopic === topic ? 'active' : ''}`}
                                            onClick={() => handleTopicChange(topic)}
                                        >
                                            {topic}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            {/* 多模态系列 */}
                            <div className="topic-row">
                                <span className="category-label">多模态</span>
                                <div className="btn-group">
                                    {['ViT', 'CLIP', 'BLIP', 'BLIP2', 'LLaVA'].map(topic => (
                                        <button
                                            key={topic}
                                            className={`btn ${selectedTopic === topic ? 'active' : ''}`}
                                            onClick={() => handleTopicChange(topic)}
                                        >
                                            {topic}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            {/* 前置理论 */}
                            <div className="topic-row">
                                <span className="category-label">前置理论</span>
                                <div className="btn-group">
                                    <button
                                        className={`btn ${selectedTopic === '经典机器学习' ? 'active' : ''}`}
                                        onClick={() => handleTopicChange('经典机器学习')}
                                    >
                                        经典机器学习
                                    </button>
                                    <button
                                        className={`btn ${selectedTopic === '深度学习基础' ? 'active' : ''}`}
                                        onClick={() => handleTopicChange('深度学习基础')}
                                    >
                                        深度学习基础
                                    </button>
                                </div>
                            </div>
                            {/* 强化学习 */}
                            <div className="topic-row">
                                <span className="category-label">强化学习</span>
                                <div className="btn-group">
                                    {['Bandits', 'PG', 'Q-Learning', '策略优化', '人类对齐'].map(topic => (
                                        <button
                                            key={topic}
                                            className={`btn ${selectedTopic === topic ? 'active' : ''}`}
                                            onClick={() => handleTopicChange(topic)}
                                        >
                                            {topic}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="book-status">
                        <div className="book-status-main">
                            <span>
                            {selectedTopic === '全部' ? (
                                <>整架：<strong>全部专题混览</strong></>
                            ) : (
                                <>在读：<strong>《{selectedTopic}》</strong></>
                            )}
                            </span>
                            {selectedTopic !== '全部' && (
                                <button
                                    type="button"
                                    className="btn btn-ghost book-status-back"
                                    onClick={() => handleTopicChange('全部')}
                                >
                                    整架
                                </button>
                            )}
                        </div>
                        <div>
                            {selectedTopic === '全部' ? (
                                <>当前可见题目：<strong>{displayQuestions.length}</strong> 道</>
                            ) : (
                                <>本册题量：<strong>{displayQuestions.length}</strong> 道</>
                            )}
                        </div>
                    </div>

                    {/* 错题复习按钮 - 右上角固定位置 */}
                    <button
                        className={`wrong-answers-btn ${showWrongAnswersOnly ? 'active' : ''}`}
                        onClick={toggleWrongAnswers}
                        disabled={wrongAnswerIds.size === 0}
                        title={wrongAnswerIds.size === 0 ? '暂无错题' : '点击查看错题'}
                    >
                        {showWrongAnswersOnly ? '回书架' : '错题复习'}
                        {wrongAnswerIds.size > 0 && (
                            <span className="count-badge">{wrongAnswerIds.size}</span>
                        )}
                    </button>

                    {/* 专题介绍页 */}
                    {showTopicIntro && topicIntros[selectedTopic] && (
                        <div className="topic-intro">
                            <div className="topic-intro-header">
                                <h1 className="topic-intro-title">{topicIntros[selectedTopic].title}</h1>
                                <p className="topic-intro-subtitle">{topicIntros[selectedTopic].subtitle}</p>
                            </div>
                            
                            <div 
                                className="topic-intro-content"
                                dangerouslySetInnerHTML={{
                                    __html: marked.parse(topicIntros[selectedTopic].description)
                                }}
                            />

                            {topicIntros[selectedTopic].image && (
                                <div className="topic-intro-image">
                                    <img src={topicIntros[selectedTopic].image} alt={`${topicIntros[selectedTopic].title} Architecture`} />
                                </div>
                            )}

                            <div className="topic-intro-actions">
                                <button className="start-quiz-btn" onClick={startQuiz}>
                                    翻开做题
                                </button>
                            </div>
                        </div>
                    )}

                    {/* 手撕Transformer专题说明 */}
                    {!showTopicIntro && selectedTopic === '手撕Transformer' && (
                        <div className="callout">
                            <div className="callout-title">手撕 Transformer · 引导式实战</div>
                            <div>
                                循序渐进的引导式专题，共多步从零实现完整 Transformer。每题附知识点回顾，建议按顺序完成，也可跳过已掌握部分。
                            </div>
                        </div>
                    )}

                    {/* 错题复习模式说明 */}
                    {!showTopicIntro && showWrongAnswersOnly && (
                        <div className="callout">
                            <div className="callout-title">错题复习</div>
                            <div>
                                正在复习 {wrongAnswerIds.size} 道错题；答对后会从错题集中移除。
                            </div>
                        </div>
                    )}

                    {/* 题目内容区域 - 只在不显示专题介绍时渲染 */}
                    {!showTopicIntro && (
                    <>
                    <div className="progress-bar">
                        <div className="progress-fill" style={{ width: `${progress}%` }}></div>
                    </div>

                    <div className="question-card">
                        <div className="question-header">
                            <div className="question-number">
                                {currentQuestion.topic === '手撕Transformer' ? (
                                    <span>
                                        Step {currentQuestion.order}/{displayQuestions.filter(q => q.topic === '手撕Transformer').length} 
                                        <span style={{ color: 'var(--muted)', fontSize: '0.75rem', marginLeft: '8px' }}>
                                            （{currentQuestionIndex + 1} / {displayQuestions.length}）
                                        </span>
                                    </span>
                                ) : (
                                    `第 ${currentQuestionIndex + 1} / ${displayQuestions.length} 题`
                                )}
                            </div>
                            <div className="badges">
                                {/* 题目类型标签 */}
                                <span className="badge badge-type">
                                    {currentQuestion.type === '代码默写' ? '代码' :
                                     currentQuestion.type === '简答' || currentQuestion.type === '填空' ? '问答' :
                                     currentQuestion.type === '多选' ? '多选' : '选择'}
                                </span>
                                <span className={`badge difficulty-${currentQuestion.difficulty}`}>
                                    {currentQuestion.difficulty}
                                </span>
                                <span className="badge topic">{currentQuestion.topic}</span>
                            </div>
                        </div>

                        <div className="question-content">
                            {currentQuestion.question}
                        </div>

                        {currentQuestion.code && renderCodeBlock()}

                        {/* 提示类型：只显示内容，不需要答题 */}
                        {currentQuestion.type === '提示' && (
                            <div className="hint-box">
                                <div
                                    dangerouslySetInnerHTML={{
                                        __html: marked.parse(currentQuestion.content || '')
                                    }}
                                />
                            </div>
                        )}

                        {(currentQuestion.type === '选择' || currentQuestion.type === '多选') && (
                            <div className="options">
                                {currentQuestion.options.map((option, index) => {
                                    const isSelected = currentQuestion.type === '多选' ? 
                                        userAnswers.includes(index) : 
                                        userAnswers[0] === index;
                                    const isCorrectOption = currentQuestion.type === '多选' ?
                                        currentQuestion.correct.includes(index) :
                                        index === currentQuestion.correct;
                                    const isIncorrect = showFeedback && isSelected && !isCorrectOption;
                                    
                                    return (
                                        <div
                                            key={index}
                                            className={`option ${isSelected ? 'selected' : ''} ${
                                                showFeedback && isCorrectOption ? 'correct' : ''
                                            } ${isIncorrect ? 'incorrect' : ''}`}
                                            onClick={() => !showFeedback && handleAnswerChange(0, index)}
                                        >
                                            {currentQuestion.type === '多选' && (
                                                <span style={{ marginRight: '8px' }}>
                                                    {isSelected ? '☑' : '☐'}
                                                </span>
                                            )}
                                            {option}
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {showFeedback && (
                            <div className={`feedback ${(currentQuestion.type === '代码默写' || currentQuestion.type === '简答' || currentQuestion.type === '填空') ? 'correct' : (isCorrect ? 'correct' : 'incorrect')}`}>
                                <div className="feedback-title">
                                    {(currentQuestion.type === '代码默写' || currentQuestion.type === '简答' || currentQuestion.type === '填空') ?
                                        '参考答案' :
                                        (isCorrect ? '回答正确' : '回答错误')}
                                </div>
                                
                                {/* 代码默写题显示参考答案 */}
                                {currentQuestion.type === '代码默写' && (
                                    <div style={{ 
                                        background: 'var(--code-bg)', 
                                        padding: '12px 14px', 
                                        borderRadius: '2px', 
                                        marginBottom: '12px',
                                        border: '1px solid var(--border)',
                                        fontFamily: 'ui-monospace, Consolas, Monaco, monospace',
                                        fontSize: '0.875rem'
                                    }}>
                                        <div style={{ fontWeight: '600', marginBottom: '8px', color: 'var(--text)' }}>
                                            参考实现
                                        </div>
                                        {currentQuestion.answers && currentQuestion.answers.map((answer, idx) => (
                                            <div key={idx} style={{ marginBottom: '6px', display: 'flex', alignItems: 'flex-start' }}>
                                                <span style={{ 
                                                    color: 'var(--muted)', 
                                                    marginRight: '8px',
                                                    minWidth: '60px',
                                                    flexShrink: 0
                                                }}>
                                                    空白{idx + 1}:
                                                </span>
                                                <code style={{ 
                                                    background: 'var(--surface)', 
                                                    color: 'var(--code-fg)', 
                                                    padding: '4px 8px', 
                                                    borderRadius: '2px',
                                                    fontWeight: '500',
                                                    wordBreak: 'break-all',
                                                    border: '1px solid var(--border)'
                                                }}>
                                                    {answer}
                                                </code>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                
                                {/* 简答题和填空题显示标准答案 */}
                                {(currentQuestion.type === '简答' || currentQuestion.type === '填空') && currentQuestion.answer && (
                                    <div style={{ 
                                        background: 'var(--code-bg)', 
                                        padding: '12px 14px', 
                                        borderRadius: '2px', 
                                        marginBottom: '12px',
                                        fontSize: '0.875rem',
                                        lineHeight: '1.6',
                                        border: '1px solid var(--border)'
                                    }}>
                                        <div style={{ fontWeight: '600', marginBottom: '8px', color: 'var(--text)' }}>
                                            标准答案
                                        </div>
                                        <div style={{ color: 'var(--text)' }}>
                                            {currentQuestion.answer}
                                        </div>
                                    </div>
                                )}
                                
                                {/* 代码题显示正确答案 */}
                                {currentQuestion.type === '代码' && !isCorrect && (
                                    <div style={{ 
                                        background: 'var(--code-bg)', 
                                        padding: '12px 14px', 
                                        borderRadius: '2px', 
                                        marginBottom: '12px',
                                        fontFamily: 'ui-monospace, Consolas, Monaco, monospace',
                                        fontSize: '0.875rem',
                                        border: '1px solid var(--border)'
                                    }}>
                                        <div style={{ fontWeight: '600', marginBottom: '8px', color: 'var(--text)' }}>
                                            正确答案
                                        </div>
                                        {currentQuestion.answers.map((answer, idx) => (
                                            <div key={idx} style={{ marginBottom: '6px', display: 'flex', alignItems: 'center' }}>
                                                <span style={{ 
                                                    color: 'var(--muted)', 
                                                    marginRight: '8px',
                                                    minWidth: '60px'
                                                }}>
                                                    空白{idx + 1}:
                                                </span>
                                                <code style={{ 
                                                    background: 'var(--surface)', 
                                                    color: 'var(--code-fg)', 
                                                    padding: '4px 8px', 
                                                    borderRadius: '2px',
                                                    fontWeight: '500',
                                                    border: '1px solid var(--border)'
                                                }}>
                                                    {answer}
                                                </code>
                                                {userAnswers[idx] && userAnswers[idx].trim() !== '' && (
                                                    <span style={{ 
                                                        marginLeft: '12px', 
                                                        color: 'var(--muted)',
                                                        fontSize: '0.8125rem'
                                                    }}>
                                                        (你的答案: <code style={{ 
                                                            background: 'rgba(220, 38, 38, 0.08)', 
                                                            color: 'var(--bad)',
                                                            padding: '2px 6px',
                                                            borderRadius: '2px',
                                                            border: '1px solid var(--bad)'
                                                        }}>{userAnswers[idx]}</code>)
                                                    </span>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                )}
                                
                                <div 
                                    className="explanation" 
                                    dangerouslySetInnerHTML={{ 
                                        __html: typeof marked !== 'undefined' 
                                            ? marked.parse(currentQuestion.explanation) 
                                            : currentQuestion.explanation 
                                    }}
                                />
                            </div>
                        )}

                        <div className="action-buttons">
                            {currentQuestionIndex > 0 && (
                                <button className="btn" onClick={handlePrevious}>
                                    上一题
                                </button>
                            )}
                            
                            {/* 代码默写专属：查看答案按钮 */}
                            {currentQuestion.type === '代码默写' && currentQuestion.fullCode && (
                                <button
                                    className="btn btn-ghost"
                                    onClick={() => setShowFullCode(!showFullCode)}
                                >
                                    {showFullCode ? '返回默写' : '查看参考'}
                                </button>
                            )}
                            
                            {!showFeedback ? (
                                <>
                                    <button 
                                        className="btn submit" 
                                        onClick={handleSubmit}
                                        disabled={!canSubmit}
                                    >
                                        {currentQuestion.type === '代码默写' ? '查看答案' :
                                         (currentQuestion.type === '简答' || currentQuestion.type === '填空') ? '阅读答案' :
                                         '提交答案'}
                                    </button>
                                    {/* 跳过按钮 - 仅在手撕Transformer专题显示 */}
                                    {currentQuestion.topic === '手撕Transformer' && 
                                     currentQuestionIndex < displayQuestions.length - 1 && (
                                        <button
                                            className="btn btn-muted"
                                            onClick={handleNext}
                                        >
                                            跳过
                                        </button>
                                    )}
                                </>
                            ) : (
                                <>
                                    {currentQuestionIndex < displayQuestions.length - 1 && (
                                        <button className="btn next" onClick={handleNext}>
                                            下一题
                                        </button>
                                    )}
                                </>
                            )}
                        </div>
                    </div>
                    </>
                    )}

                    {/* 打乱/恢复按钮 - 仅对非"手撕Transformer"专题显示 */}
                    {selectedTopic !== '手撕Transformer' && (
                        <button
                            className={`image-button${shuffledOrder ? ' is-shuffled' : ''}`}
                            onClick={shuffledOrder ? handleResetOrder : handleShuffle}
                            title={shuffledOrder ? '恢复顺序' : '打乱题目'}
                            aria-label={shuffledOrder ? '恢复顺序' : '打乱题目'}
                        >
                            ⇄
                        </button>
                    )}

                    {/* 资源链接按钮 */}
                    <button
                        className="resource-button"
                        onClick={() => setShowResources(true)}
                        title="学习资源"
                        aria-label="学习资源"
                    >
                        ⋯
                    </button>

                    {/* 资源链接模态框 */}
                    {showResources && (
                        <div className="resource-modal" onClick={() => setShowResources(false)}>
                            <div className="resource-content" onClick={(e) => e.stopPropagation()}>
                                <button className="close-modal" onClick={() => setShowResources(false)}>
                                    ×
                                </button>
                                
                                <h2>学习资源</h2>
                                
                                <div className="resource-section">
                                    <h3>论文</h3>
                                    {resources.papers.map((paper, index) => (
                                        <a 
                                            key={index} 
                                            href={paper.url} 
                                            target="_blank" 
                                            rel="noopener noreferrer"
                                            className="resource-link"
                                        >
                                            <span className="resource-link-title">{paper.title}</span>
                                            <span className="resource-link-desc">{paper.desc}</span>
                                        </a>
                                    ))}
                                </div>

                                <div className="resource-section">
                                    <h3>代码</h3>
                                    {resources.repos.map((repo, index) => (
                                        <a 
                                            key={index} 
                                            href={repo.url} 
                                            target="_blank" 
                                            rel="noopener noreferrer"
                                            className="resource-link"
                                        >
                                            <span className="resource-link-title">{repo.title}</span>
                                            <span className="resource-link-desc">{repo.desc}</span>
                                        </a>
                                    ))}
                                </div>

                                <div className="resource-section">
                                    <h3>教程</h3>
                                    {resources.tutorials.map((tutorial, index) => (
                                        <a 
                                            key={index} 
                                            href={tutorial.url} 
                                            target="_blank" 
                                            rel="noopener noreferrer"
                                            className="resource-link"
                                        >
                                            <span className="resource-link-title">{tutorial.title}</span>
                                            <span className="resource-link-desc">{tutorial.desc}</span>
                                        </a>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<TransformerQuiz />, document.getElementById('root'));
    </script>
</body>
</html>
